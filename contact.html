<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .btn-anim {
      transition: transform 0.15s ease;
    }
    .btn-anim:active {
      transform: scale(0.9);
    }
  </style>
</head>

<body class="bg-dark text-white">

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark border-bottom">
  <div class="container">
    <a class="navbar-brand" href="index.html">🎮 Game Hub</a>
  </div>
</nav>

<div class="container py-5">

  <div class="text-center mb-5">
    <h2>📞 Hubungi Kami</h2>
    <p>Jika ada masalah atau pertanyaan, silakan kirim pesan</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card p-4 shadow bg-secondary text-white">

        <!-- FORM -->
        <div class="mb-3">
          <label>Nama</label>
          <input type="text" id="name" class="form-control">
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input type="email" id="email" class="form-control">
        </div>

        <div class="mb-3">
          <label>Pesan</label>
          <textarea id="message" class="form-control" rows="4"></textarea>
        </div>

        <button class="btn btn-warning btn-anim" onclick="sendMessage()">Kirim</button>

        <p id="result" class="mt-3 text-center"></p>

      </div>

      <!-- INFO KONTAK -->
      <div class="text-center mt-4">
        <p>📧 Email: eGAMINGCENTER@gmail.com</p>
        <p>📱 WhatsApp: 087834561245</p>
      </div>

    </div>
  </div>

</div>

<script>
function sendMessage(){
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let message = document.getElementById("message").value;
  let result = document.getElementById("result");

  if(name === "" || email === "" || message === ""){
    result.innerHTML = "❌ Semua field harus diisi!";
    result.style.color = "red";
  } else {
    result.innerHTML = "✅ Pesan berhasil dikirim!";
    result.style.color = "lightgreen";

    // reset form
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("message").value = "";
  }
}
</script>

</body>
</html>

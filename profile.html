<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tebak Gambar</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    /* BODY */
    body{

      background:
      linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
      url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop');

      background-size:cover;
      background-position:center;

      animation:bgMove 15s infinite alternate;

      color:white;

      overflow-x:hidden;

    }

    /* BACKGROUND MOVE */
    @keyframes bgMove{

      from{
        background-position:center;
      }

      to{
        background-position:top;
      }

    }

    /* NAVBAR */
    .navbar{

      background:rgba(0,0,0,0.7);

      backdrop-filter:blur(10px);

      box-shadow:0 0 15px rgba(0,255,255,0.2);

    }

    .navbar-brand{

      color:#00ffe5 !important;

      font-weight:bold;

      font-size:1.5rem;

      text-shadow:0 0 10px cyan;

    }

    .nav-link{

      color:white !important;

      margin-left:10px;

      transition:0.3s;

    }

    .nav-link:hover{

      color:#00ffe5 !important;

      text-shadow:0 0 10px cyan;

    }

    /* TITLE */
    h2{

      color:#00ffe5;

      text-shadow:0 0 15px #00ffe5;

      animation:glowTitle 1.5s infinite alternate;

    }

    @keyframes glowTitle{

      from{
        text-shadow:0 0 10px #00ffe5;
      }

      to{
        text-shadow:0 0 25px cyan;
      }

    }

    /* GAME BOX */
    .game-box{

      background:rgba(255,255,255,0.05);

      border-radius:25px;

      padding:30px;

      backdrop-filter:blur(10px);

      box-shadow:0 0 20px rgba(0,255,255,0.2);

      margin-top:100px;

    }

    /* IMAGE */
    .img-box{

      max-height:250px;

      object-fit:cover;

      border-radius:15px;

      transition:0.3s;

      box-shadow:0 0 15px rgba(0,0,0,0.5);

    }

    .img-box:hover{

      transform:scale(1.03);

      box-shadow:0 0 25px cyan;

    }

    /* INPUT */
    .form-control{

      background:rgba(255,255,255,0.08);

      border:none;

      color:white;

      border-radius:12px;

    }

    .form-control:focus{

      background:rgba(255,255,255,0.12);

      color:white;

      box-shadow:0 0 10px cyan;

    }

    /* BUTTON */
    .btn-anim{

      transition:0.15s;

    }

    .btn-anim:active{

      transform:scale(0.9);

    }

    .btn-warning{

      border-radius:12px;

      font-weight:bold;

      transition:0.2s;

    }

    .btn-warning:hover{

      transform:scale(1.05);

      box-shadow:0 0 15px gold;

    }

    /* RESULT */
    #result{

      animation:fadeResult 0.5s;

    }

    @keyframes fadeResult{

      from{
        opacity:0;
        transform:translateY(10px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* SCORE */
    #score{

      color:gold;

      font-weight:bold;

      font-size:1.2rem;

      text-shadow:0 0 10px gold;

    }

    /* POPUP */
    .win-popup{

      position:fixed;

      top:0;
      left:0;

      width:100%;
      height:100%;

      background:rgba(0,0,0,0.8);

      display:none;

      justify-content:center;
      align-items:center;

      z-index:999;

    }

    .show-popup{

      display:flex;

      animation:fadeIn 0.5s;

    }

    .popup-box{

      background:linear-gradient(135deg,#222,#333);

      padding:40px;

      border-radius:20px;

      text-align:center;

      border:3px solid gold;

      box-shadow:0 0 25px gold;

      animation:zoomIn 0.5s;

    }

    .popup-box h1{

      color:gold;

      animation:glow 1s infinite alternate;

    }

    @keyframes glow{

      from{
        text-shadow:0 0 10px gold;
      }

      to{
        text-shadow:0 0 25px yellow;
      }

    }

    @keyframes zoomIn{

      from{
        transform:scale(0.5);
        opacity:0;
      }

      to{
        transform:scale(1);
        opacity:1;
      }

    }

    @keyframes fadeIn{

      from{
        opacity:0;
      }

      to{
        opacity:1;
      }

    }

  </style>

</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">

    <div class="container-fluid px-4">

      <a class="navbar-brand" href="index.html">
        🎮 Gaming Bos
      </a>

      <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav">

        <span class="navbar-toggler-icon"></span>

      </button>

      <div class="collapse navbar-collapse" id="navbarNav">

        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="index.html">
              Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="profile.html">
              Game 1
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="about.html">
              Game 2
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="contact.html">
              Contact
            </a>
          </li>

        </ul>

      </div>

    </div>

  </nav>

  <!-- CONTENT -->
  <div class="container">

    <div class="game-box text-center">

      <h2 class="mb-3">
        🧠 Tebak Gambar
      </h2>

      <!-- CATEGORY -->
      <h5 id="kategori"
      class="text-warning mb-2"></h5>

      <!-- PROGRESS -->
      <p id="progress">
        Soal 1 / 10
      </p>

      <!-- IMAGE -->
      <img id="image"
      class="img-fluid img-box mb-4">

      <!-- INPUT -->
      <input
      type="text"
      id="answer"
      class="form-control w-50 mx-auto"
      placeholder="Tulis jawaban...">

      <!-- BUTTON -->
      <button
      class="btn btn-warning mt-3 btn-anim"
      onclick="checkAnswer()">

        Jawab

      </button>

      <!-- RESULT -->
      <h4 id="result"
      class="mt-4"></h4>

      <!-- SCORE -->
      <p id="score">
        Score: 0
      </p>

      <!-- BACK -->
      <a href="index.html"
      class="btn btn-light mt-4">

        Back

      </a>

    </div>

  </div>

  <!-- POPUP -->
  <div id="winPopup" class="win-popup">

    <div class="popup-box">

      <h1>
        🎉 SELAMAT! 🎉
      </h1>

      <p>
        Kamu berhasil menyelesaikan game!
      </p>

      <h3 id="finalScore"></h3>

      <a href="index.html"
      class="btn btn-warning mt-3">

        Kembali ke Home

      </a>

    </div>

  </div>

  <script>

    // DATA GAME
    let data = [

      {img: "img/kucing.jpg", answer: "kucing"},
      {img: "img/anjing.jpg", answer: "anjing"},
      {img: "img/singa.jpg", answer: "singa"},

      {img: "img/burger.jpg", answer: "burger"},
      {img: "img/pizza.jpg", answer: "pizza"},
      {img: "img/nasi-goreng.jpg", answer: "nasi goreng"},

      {img: "img/gunung.jpg", answer: "gunung"},
      {img: "img/pantai.jpg", answer: "pantai"},
      {img: "img/hutan.jpg", answer: "hutan"},
      {img: "img/air-terjun.jpg", answer: "air terjun"}

    ];

    let index = 0;
    let score = 0;

    showQuestion();

    function showQuestion(){

      document.getElementById("image").src =
      data[index].img;

      document.getElementById("progress").innerHTML =
      "Soal " + (index+1) + " / " + data.length;

      let kategori = "";

      if(index < 3){

        kategori = "🐶 Hewan";

      }

      else if(index < 6){

        kategori = "🍔 Makanan";

      }

      else{

        kategori = "🌍 Alam";

      }

      document.getElementById("kategori").innerHTML =
      kategori;

    }

    // CHECK ANSWER
    function checkAnswer(){

      let user =
      document.getElementById("answer")
      .value
      .toLowerCase();

      let result =
      document.getElementById("result");

      // BENAR
      if(user === data[index].answer){

        result.innerHTML = "✅ Benar!";

        score++;

        document.getElementById("image")
        .style.transform = "scale(1.05)";

        setTimeout(()=>{

          document.getElementById("image")
          .style.transform = "scale(1)";

        },300);

      }

      // SALAH
      else{

        result.innerHTML =
        "❌ Salah! Jawaban: " +
        data[index].answer;

      }

      // SCORE
      document.getElementById("score").innerHTML =
      "Score: " + score;

      index++;

      // NEXT
      if(index < data.length){

        setTimeout(()=>{

          document.getElementById("answer").value = "";

          result.innerHTML = "";

          showQuestion();

        },1000);

      }

      // FINISH
      else{

        document.getElementById("winPopup")
        .classList.add("show-popup");

        document.getElementById("finalScore")
        .innerHTML =
        "🏆 Score Akhir: " + score;

      }

    }

  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
